name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Download and convert Croatian alphabet audio files
        run: |
          mkdir -p assets/audio
          declare -A files=(
            [a]="https://upload.wikimedia.org/wikipedia/commons/2/21/Hr-A.ogg"
            [b]="https://upload.wikimedia.org/wikipedia/commons/5/5e/Hr-B.ogg"
            [c]="https://upload.wikimedia.org/wikipedia/commons/6/61/Hr-C.ogg"
            [ch]="https://upload.wikimedia.org/wikipedia/commons/d/d0/Hr-%C4%8C.ogg"
            [cy]="https://upload.wikimedia.org/wikipedia/commons/3/38/Hr-%C4%86.ogg"
            [d]="https://upload.wikimedia.org/wikipedia/commons/4/44/Hr-D.ogg"
            [dz]="https://upload.wikimedia.org/wikipedia/commons/5/5f/Hr-D%C5%BE.ogg"
            [dj]="https://upload.wikimedia.org/wikipedia/commons/2/24/Hr-%C4%90.ogg"
            [e]="https://upload.wikimedia.org/wikipedia/commons/9/9f/Hr-E.ogg"
            [f]="https://upload.wikimedia.org/wikipedia/commons/7/70/Hr-F.ogg"
            [g]="https://upload.wikimedia.org/wikipedia/commons/5/5c/Hr-G.ogg"
            [h]="https://upload.wikimedia.org/wikipedia/commons/f/fc/Hr-H.ogg"
            [i]="https://upload.wikimedia.org/wikipedia/commons/b/b9/Hr-I.ogg"
            [j]="https://upload.wikimedia.org/wikipedia/commons/e/e6/Hr-J.ogg"
            [k]="https://upload.wikimedia.org/wikipedia/commons/5/58/Hr-K.ogg"
            [l]="https://upload.wikimedia.org/wikipedia/commons/5/50/Hr-L.ogg"
            [lj]="https://upload.wikimedia.org/wikipedia/commons/0/03/Hr-LJ.ogg"
            [m]="https://upload.wikimedia.org/wikipedia/commons/a/a7/Hr-M.ogg"
            [n]="https://upload.wikimedia.org/wikipedia/commons/e/e9/Hr-N.ogg"
            [nj]="https://upload.wikimedia.org/wikipedia/commons/d/d6/Hr-NJ.ogg"
            [o]="https://upload.wikimedia.org/wikipedia/commons/1/19/Hr-O.ogg"
            [p]="https://upload.wikimedia.org/wikipedia/commons/6/6f/Hr-P.ogg"
            [r]="https://upload.wikimedia.org/wikipedia/commons/2/26/Hr-R.ogg"
            [s]="https://upload.wikimedia.org/wikipedia/commons/c/c3/Hr-S.ogg"
            [sh]="https://upload.wikimedia.org/wikipedia/commons/3/39/Hr-%C5%A0.ogg"
            [t]="https://upload.wikimedia.org/wikipedia/commons/0/00/Hr-T.ogg"
            [u]="https://upload.wikimedia.org/wikipedia/commons/5/54/Hr-U.ogg"
            [v]="https://upload.wikimedia.org/wikipedia/commons/9/9b/Hr-V.ogg"
            [z]="https://upload.wikimedia.org/wikipedia/commons/a/a1/Hr-Z.ogg"
            [zh]="https://upload.wikimedia.org/wikipedia/commons/f/f6/Hr-%C5%BD.ogg"
          )
          for key in "${!files[@]}"; do
            url="${files[$key]}"
            echo "Downloading $key..."
            curl -L -A "Mozilla/5.0" -o "assets/audio/${key}.ogg" "$url"
            echo "Converting $key to mp3..."
            ffmpeg -i "assets/audio/${key}.ogg" -acodec libmp3lame -q:a 4 "assets/audio/${key}.mp3" -y
            rm "assets/audio/${key}.ogg"
          done
          echo "Done: $(ls assets/audio/*.mp3 | wc -l) mp3 files ready"

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: croatian-alphabet-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
